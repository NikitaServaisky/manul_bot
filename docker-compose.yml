services:
  db:
    image: postgres:15
    container_name: manul_garage_db
    restart: always
    env_file: .env
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - TZ=Asia/Jerusalem
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  manul-bot:
    build: .
    container_name: manul_garage_bot
    restart: always
    depends_on:
      - db
    env_file: .env
    environment:
      - TZ=Asia/Jerusalem
      - PYTHONPATH=/app
      - DB_HOST=db
    volumes:
      - .:/app
      - ./uploads:/app/uploads
    command: ["python", "main.py"]

  manul-hunter:
    build: .
    container_name: manul_garage_hunter
    restart: always
    depends_on:
      - db
    env_file: .env
    environment:
      - TZ=Asia/Jerusalem
      - PYTHONPATH=/app
      - DB_HOST=db
    volumes:
      - .:/app
    command: ["python", "scripts/hunter.py"]

volumes:
  postgres_data: