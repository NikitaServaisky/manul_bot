services:
  manul-bot:
    build: .
    container_name: manul_garage_bot
    restart: always
    env_file: .env
    environment:
      - TZ=Asia/Jerusalem
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
    volumes:
      - .:/app
      - ./uploads:/app/uploads
    command: ["python", "main.py"]

  manul-hunter:
    build: .
    container_name: manul_garage_hunter
    restart: always
    env_file: .env
    environment:
      - TZ=Asia/Jerusalem
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
    volumes:
      - .:/app
    command: ["python", "scripts/hunter.py"]