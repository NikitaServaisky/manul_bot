services:
  # Main Telegram Bot Service
  manul-bot:
    build: .
    container_name: manul_garage_bot
    restart: always
    env_file:
      - .env
    environment:
      - TZ=Asia/Jerusalem
    command: ["python", "main.py"] 
    volumes:
      - .:/app
      - ./database.db:/app/database.db
      - ./uploads:/app/uploads
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Background Lead Hunter Service
  manul-hunter:
    build: .
    container_name: manul_garage_hunter
    restart: always
    env_file:
      - .env
    environment:
      - TZ=Asia/Jerusalem
    volumes:
      - .:/app
      - ./database.db:/app/database.db
    command: ["python", "hunter_service.py"] 
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"